  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: 'Georgia', serif; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 14px 24px;
      background: linear-gradient(180deg, rgba(0,0,0,0.72) 0%, transparent 100%);
      pointer-events: none; z-index: 10;
    }
    #restaurant-name {
      color: #FFD700; font-size: 22px; letter-spacing: 4px;
      text-shadow: 0 0 14px rgba(255,180,0,0.85); font-style: italic;
    }
    #instructions {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #FFD700; font-size: 12px;
      padding: 7px 18px; border-radius: 20px;
      pointer-events: none; z-index: 10; letter-spacing: 1px;
      border: 1px solid rgba(255,215,0,0.3);
    }
  </style>
</head>
<body>
<div id="hud"><div id="restaurant-name">🏮 Golden Lotus</div></div>
<div id="instructions">🕹️ WASD / Arrow Keys = Move &nbsp;|&nbsp; Mouse = Look &nbsp;|&nbsp; Click scene to lock pointer</div>

       Fix: rotate south chair 180° so it faces the table properly. -->

  <!-- SOUTH chair at z=-11.1, table at z=-13 → chair must face north (toward -Z world) → rotation Y=180 -->
